<!DOCTYPE html>
<html>

<head>
<title>Instruction Parser</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:8px;
width:650px;
margin:auto;
}

textarea{
width:100%;
height:120px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.output{
background:#222;
color:#00ff9c;
padding:20px;
margin-top:20px;
font-family: monospace;
white-space: pre-wrap;
}
</style>

</head>

<body>

<div class="container">

<h2>Natural Language Test Case Parser</h2>

<form method="POST">

<textarea name="testcase" placeholder="Enter test case here..."></textarea>

<br>

<button type="submit">Generate JSON Output</button>

</form>

{% if json_output %}

<div class="output">
{{ json_output }}
</div>

{% endif %}

</div>

</body>

</html>
