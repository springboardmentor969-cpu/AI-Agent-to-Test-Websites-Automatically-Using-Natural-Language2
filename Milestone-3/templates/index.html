<!DOCTYPE html>
<html>
<head>
    <title>AI Automation Agent</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: 600px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #67e8f9;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #22d3ee, #14b8a6);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .section {
            margin-top: 20px;
            text-align: left;
        }

        .section h3 {
            margin-bottom: 8px;
            color: #cbd5f5;
        }

        .box {
            background: #020617;
            padding: 12px;
            border-radius: 10px;
            min-height: 40px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 13px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #22c55e;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>🤖 AI Automation Agent</h1>

    <input 
        id="instruction" 
        class="input-box"
        placeholder="Try: open youtube and search calm songs and click first video"
    >

    <button class="btn" onclick="runAgent()">Run Agent</button>

    <div class="status" id="status"></div>

    <div class="section">
        <h3>Parsed Actions</h3>
        <div class="box"><pre id="parsed"></pre></div>
    </div>

    <div class="section">
        <h3>Generated Code</h3>
        <div class="box"><pre id="code"></pre></div>
    </div>

</div>

<script>
function runAgent() {
    const instruction = document.getElementById("instruction").value;

    if (!instruction) {
        alert("Please enter instruction");
        return;
    }

    

    fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ instruction: instruction })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("parsed").textContent =
            JSON.stringify(data.parsed || [], null, 2);

        document.getElementById("code").textContent =
            data.code || "No code generated";

        
    })
    .catch(err => {
        console.error(err);
        document.getElementById("status").textContent = "❌ Error";
    });
}
</script>

</body>
</html>
