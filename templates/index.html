<!DOCTYPE html>
<html>
<head>
<title>AI Test Automation Agent</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: radial-gradient(circle at center, #1a1f4d, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    width: 700px;
    text-align: center;
}

h1 {
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00eaff;
    color: white;
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg,#00eaff,#00ff9c);
}

.bar {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.08);
}
</style>

</head>

<body>

<div class="container">

<h1>⚡ AI Test Automation Agent</h1>

<textarea id="inputBox"
placeholder="open amazon and search iphone"></textarea>

<button onclick="runTest()">Run Automation</button>

<div class="bar">⚡ Listening...</div>

</div>

<script>
function runTest() {
    let instruction = document.getElementById("inputBox").value;

    fetch('/run', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({instruction: instruction})
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("result", JSON.stringify(data));
        window.location.href = "/result";
    });
}
</script>

</body>
</html>
