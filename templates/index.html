<!DOCTYPE html>
<html>
<head>
    <title>AI Agent UI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #ffcc00;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ffdd33;
        }

        pre {
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🤖 AI Instruction Parser</h2>

        <form method="post">
            <input type="text" name="instruction" placeholder="Enter instruction...">
            <br>
            <button type="submit">Run Agent</button>
        </form>

        {% if actions %}
            <h3>Parsed Actions:</h3>
            <pre>{{ actions }}</pre>
        {% endif %}

        {% if result %}
           <h3>Agent Response:</h3>
           <pre>{{ result }}</pre>
        {% endif %}

    </div>
</body>
</html>
