<!DOCTYPE html>
<html>
<head>
    <title>AI Website Testing Agent</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .response-box {
            background: #f4f4f4;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
        }

        #loginMessage {
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🤖 AI Website Testing Agent</h2>

    <form method="POST">
        <input type="text" name="instruction"
               placeholder="Enter test instruction..."
               required>
        <button type="submit">Generate Steps</button>
    </form>

    {% if result %}
        <div class="response-box">
            <strong>Agent Response:</strong>
            <pre>{{ result }}</pre>
        </div>
    {% endif %}

    <hr>


</div>

</body>
</html>
