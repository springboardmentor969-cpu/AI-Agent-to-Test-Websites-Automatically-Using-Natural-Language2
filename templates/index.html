<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>AI Test Agent</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6fb;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>AI Automation Test Agent</h1>

        <form action="/run" method="POST">

            <input type="text" name="instruction" placeholder="Example: open youtube search telusko click first video"
                required>

            <button type="submit">Run</button>

        </form>

        <div class="footer">
            Enter an instruction and let the AI agent execute it.
        </div>

    </div>

</body>

</html>
