<!DOCTYPE html>
<html>
<head>
<title>Execution Report</title>

<style>
body {
    background: #0a0f2c;
    color: white;
    font-family: 'Segoe UI';
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
}

.code {
    background: black;
    padding: 10px;
    color: #00ff9c;
    font-family: monospace;
}
</style>

</head>

<body>

<h1>Execution Report</h1>

<div class="card" id="status"></div>

<div class="card">
<h3>Parsed Code</h3>
<div class="code" id="parsed"></div>
</div>

<div class="card">
<h3>Generated Code</h3>
<div class="code" id="generated"></div>
</div>

<div class="card">
<h3>Screenshot</h3>
<img src="/static/result.png" width="500">
</div>

<div class="card" id="time"></div>

<script>
let data = JSON.parse(localStorage.getItem("result"));

document.getElementById("status").innerHTML =
"Status: " + data.status;

document.getElementById("parsed").innerText =
data.parsed_actions.join("\n");

document.getElementById("generated").innerText =
data.parsed_actions.join("\n");

document.getElementById("time").innerHTML =
"Execution Time: " + data.time + " sec";
</script>

</body>
</html>
