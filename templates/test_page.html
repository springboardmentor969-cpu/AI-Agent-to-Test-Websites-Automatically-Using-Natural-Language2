<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Login Page — Test Target</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #090a0f;
            --surface: rgba(26, 29, 39, 0.7);
            --border: rgba(46, 51, 71, 0.8);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            background-image: radial-gradient(circle at center, rgba(139, 92, 246, 0.1), transparent 60%);
            padding: 1rem;
            color: var(--text);
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }

        .login-card h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: .3rem;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: .85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: .82rem;
            font-weight: 500;
            color: #ccc;
            margin-bottom: .3rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .7rem .9rem;
            background: rgba(15, 17, 23, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .92rem;
            margin-bottom: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button[type="submit"] {
            width: 100%;
            padding: .75rem;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .2s;
        }
        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* Messages */
        .message {
            margin-top: 1.2rem;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 500;
            text-align: center;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .hint {
            margin-top: 1.2rem;
            text-align: center;
            font-size: .76rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🔐 Sample Login</h1>
        <p class="subtitle">Test target page for the AI Test Agent</p>

        <form method="POST" action="/sample" id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password">

            <button type="submit" id="login-btn">Log In</button>
        </form>

        {% if message %}
        <div class="message {{ msg_type }}" id="result-message">
            {{ message }}
        </div>
        {% endif %}

        <p class="hint">
            Valid credentials: <strong>admin</strong> / <strong>password123</strong>
        </p>
    </div>

</body>
</html>
