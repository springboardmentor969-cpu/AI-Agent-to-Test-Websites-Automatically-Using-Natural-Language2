<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Login Page — Test Target</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.18);
        }

        .login-card h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: .3rem;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: .85rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: .82rem;
            font-weight: 500;
            color: #555;
            margin-bottom: .3rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .7rem .9rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: .92rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border .2s;
        }
        input:focus { border-color: #667eea; }

        button[type="submit"] {
            width: 100%;
            padding: .75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .2s;
        }
        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102,126,234,.4);
        }

        /* Messages */
        .message {
            margin-top: 1.2rem;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 500;
            text-align: center;
        }
        .message.success {
            background: #e6fbf2;
            color: #0f9d58;
            border: 1px solid #b7e9d0;
        }
        .message.error {
            background: #fde8ec;
            color: #d93025;
            border: 1px solid #f5b7be;
        }

        .hint {
            margin-top: 1.2rem;
            text-align: center;
            font-size: .76rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🔐 Sample Login</h1>
        <p class="subtitle">Test target page for the AI Test Agent</p>

        <form method="POST" action="/sample" id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password">

            <button type="submit" id="login-btn">Log In</button>
        </form>

        {% if message %}
        <div class="message {{ msg_type }}" id="result-message">
            {{ message }}
        </div>
        {% endif %}

        <p class="hint">
            Valid credentials: <strong>admin</strong> / <strong>password123</strong>
        </p>
    </div>

</body>
</html>
